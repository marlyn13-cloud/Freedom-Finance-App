<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Freedom Finance - Budget</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/rivescript@latest/dist/rivescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/currency.js/2.0.4/currency.min.js"></script>
</head>
<body>

  <div class="dashboard-layout">
    
    <aside class="sidebar">
      <div class="brand-header">
        <img src="LogInLogo.png" alt="Logo" class="brand-logo">
        <div class="brand-text">
          <span class="text-dark">Freedom</span><span class="text-blue">Finance</span>
        </div>
      </div>

      <div class="sidebar-balance-card">
        <div class="s-balance-label">TOTAL BALANCE</div>
        <div class="s-balance-amount" id="side-balance">$3,897.11</div>
        <div class="s-balance-sub" id="side-savings-pct">0% of income saved</div>
      </div>

      <div class="nav-section">
        <div class="nav-label">OVERVIEW</div>
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
          <span class="nav-icon">𓃑</span> Dashboard
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-label">MANAGE</div>
        <button class="nav-item" onclick="window.location.href='transaction.html'">
          <span class="nav-icon">💵</span> Transactions
        </button>
        <button class="nav-item active">
          <span class="nav-icon">💰</span> Budget
          <span class="status-dot"></span>
        </button>
        <div class="nav-section">
        <button class="nav-item" onclick="window.location.href='reports.html'">
          <span class="nav-icon">📝</span> Reports
        </button>
      </div>
      </div>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar">~</div>
          <div class="user-info">
            <div class="user-name">User</div>
            <div class="user-type">Personal account</div>
          </div>
        </div>
        <button class="sign-out-btn" onclick="window.logoutUser()">Sign out</button>
      </div>
    </aside>

    <main class="main-content">
      
      <header class="page-header" style="align-items: center;">
        <div>
          <h1 class="greeting">Budget</h1>
          <p class="current-date">Monthly spending limits</p>
        </div>
        
        <div style="position: relative; display: inline-block;">
          <div class="message-bubble">💡 Add or Edit Budgets here!</div>
          <button class="btn-primary" onclick="openBudgetModalAdd()">+ New Budget</button>
        </div>
        
      </header>

      <section class="budget-list">
      </section>
    </main>
    <div class="modal hidden" id="budgetModal" onclick="backdropClose(event,'budgetModal')">
    <div class="modal-content" role="dialog" aria-modal="true">
      <div class="modal-top">
        <h3 id="budgetModalTitle">New Budget</h3>
        <button class="close-x" onclick="closeModal('budgetModal')" aria-label="Close">✕</button>
      </div>
      
      <label for="budCategory">Category</label>
      <input id="budCategory" placeholder="e.g., Food" />
      
      <label for="budLimit">Monthly Limit (USD)</label>
      <input id="budLimit" type="number" step="0.01" />
      
      <div class="error" id="budError"></div>
      
      <div class="actions">
        <button class="btn secondary" onclick="closeModal('budgetModal')">Cancel</button>
        <button class="btn primary" id="budSaveBtn" onclick="saveBudget()">Save</button>
      </div>
    </div>
  </div>
  <!-- Spark AI -->
  <button id="spark-fab" onclick="toggleChat()">✨</button>
  <div id="spark-chat-window" class="hidden">
    <div class="chat-header">
  <div class="chat-header-info">
    <div class="chat-header-avatar">✦</div>
    <div class="chat-header-text">
      <span class="chat-header-name">Spark AI</span>
      <span class="chat-header-status">Online now</span>
    </div>
  </div>
  <button type="button" class="close-chat" onclick="toggleChat()">✕</button>
</div>
    <div class="chat-body" id="spark-chat-body">
      <div class="chat-msg bot">Hi! I'm Spark ✨ — Type to get started!</div>
    </div>
    <div class="chat-input">
      <input type="text" id="spark-input" placeholder="Type a message..." disabled />
      <button id="spark-send-btn" onclick="handleSparkSend()" disabled>Send</button>
    </div>
  </div>
  </div> 
  <script src="script.js"></script>
</body>
</html>
